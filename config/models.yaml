# LLM Council model registry.
# Swap models here without code changes — NIM deprecates models with short notice.
# role: "council" (debater) or "chief_justice" (synthesizer).
# The first enabled chief_justice is used; the rest are fallbacks, in order.

base_url: https://integrate.api.nvidia.com/v1
requests_per_minute: 40   # per model

models:
  - id: deepseek-ai/deepseek-v4-flash
    alias: Analyst A
    role: council
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384          # thinking tokens count against this budget
    extra_body:
      chat_template_kwargs:
        thinking: true
        reasoning_effort: high
    enabled: true

  - id: mistralai/mistral-medium-3.5-128b
    alias: Analyst B
    role: council
    temperature: 0.7
    max_tokens: 2048
    enabled: true

  - id: minimaxai/minimax-m3
    alias: Analyst C
    role: council
    temperature: 0.7
    max_tokens: 2048
    enabled: true

  - id: stepfun-ai/step-3.7-flash
    alias: Analyst D
    role: council
    temperature: 0.7
    max_tokens: 2048
    enabled: true

  - id: nvidia/nemotron-3-ultra-550b-a55b
    alias: Chief Justice
    role: chief_justice
    temperature: 0.3
    max_tokens: 3072
    enabled: true

  - id: moonshotai/kimi-k2.6
    alias: Chief Justice (fallback)
    role: chief_justice
    temperature: 0.3
    max_tokens: 3072
    enabled: true
